<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>The Holy Anthonian Orthodox Church</title>

    <style>
      .lord-loop {
        text-align: center;
        color: red;
        font-size: 38px;
        font-weight: bold;
        font-family: "Times New Roman", Georgia, serif;
        margin: 14px 0 18px 0;
        line-height: 1.5;
      }

      .lord-line {
        min-height: 1.5em;
      }

      .christ-loop {
        text-align: center;
        color: red;
        font-size: 34px;
        font-weight: bold;
        font-family: "Times New Roman", Georgia, serif;
        margin: 10px 0 0 0;
      }

      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #3c1488;
      }

      .top-nav {
        background-color: #f5f5f5;
        text-align: center;
        padding: 12px 0;
      }

      .top-nav a {
        display: inline-block;
        margin: 0 10px;
        padding: 10px 18px;
        font-size: 16px;
        text-decoration: none;
        background-color: white;
        color: black;
        border: 2px solid #333;
        border-radius: 6px;
        font-weight: bold;
      }

      .top-nav a:hover {
        background-color: #eee;
      }

      .verse-box {
        text-align: center;
        color: white;
        font-size: 24px;
        font-style: italic;
        font-family: "Times New Roman", Georgia, serif;
        padding: 25px 40px 10px 40px;
        line-height: 1.6;
      }

      .image-strip {
        display: block;
        width: 100%;
        height: 35px;
        object-fit: cover;
      }

      .header {
        text-align: center;
        background-color: #d4af37;
        padding: 28px 20px;
      }

      .header h1 {
        margin: 0;
        color: red;
        font-size: 48px;
        font-weight: bold;
        font-family: "Times New Roman", Georgia, serif;
      }

      .content {
        background-color: white;
        margin: 30px;
        padding: 25px;
        border-radius: 10px;
      }

      p {
        font-size: 18px;
        line-height: 1.6;
      }

      ul {
        margin-top: 20px;
        font-size: 17px;
      }

      li {
        margin-bottom: 10px;
      }

      .candle-right {
        width: 360px;
        float: right;
        margin-left: 20px;
        margin-bottom: 15px;
      }

      .main-image {
        display: block;
        max-width: 100%;
        margin: 30px auto 0 auto;
      }

      .prayer-button {
        display: block;
        width: 220px;
        margin: 40px auto;
        padding: 14px;
        text-align: center;
        background-color: #8b0000;
        color: white;
        text-decoration: none;
        font-weight: bold;
        border-radius: 6px;
      }

      .prayer-button:hover {
        background-color: #b30000;
      }

      .cross-wrapper {
        text-align: center;
        padding: 20px 0;
      }

      .cross-icon {
        display: block;
        margin: 0 auto;
      }

      .single-candle-under-cross {
        position: relative;
        width: 26px;
        height: 60px;
        margin: 8px auto 0 auto;
        background: linear-gradient(to bottom, #f7e7a9, #e6c96a, #caa53a);
        border-radius: 8px 8px 4px 4px;
        box-shadow: 0 0 10px rgba(255, 215, 120, 0.5);
      }

      .single-candle-under-cross::before {
        content: "";
        position: absolute;
        top: -20px;
        left: 50%;
        transform: translateX(-50%);
        width: 18px;
        height: 28px;
        background: radial-gradient(
          circle at 50% 35%,
          #fffde7 0%,
          #ffe082 28%,
          #ffca28 48%,
          #ff9800 72%,
          rgba(255, 140, 0, 0) 100%
        );
        border-radius: 50% 50% 45% 45%;
        animation: flickerFlame 0.06s infinite alternate;
        filter: blur(0.8px);
        box-shadow:
          0 0 18px rgba(255, 220, 120, 1),
          0 0 35px rgba(255, 180, 0, 0.95),
          0 0 60px rgba(255, 140, 0, 0.75);
      }

      .single-candle-under-cross::after {
        content: "";
        position: absolute;
        top: -6px;
        left: 50%;
        transform: translateX(-50%);
        width: 2px;
        height: 8px;
        background: #222;
        border-radius: 2px;
      }

      @keyframes flickerFlame {
        0% {
          transform: translateX(-50%) scale(0.9) rotate(-6deg);
          opacity: 0.85;
        }
        25% {
          transform: translateX(-50%) scale(1.1) rotate(4deg);
          opacity: 1;
        }
        50% {
          transform: translateX(-50%) scale(0.95) rotate(-8deg);
          opacity: 0.9;
        }
        75% {
          transform: translateX(-50%) scale(1.18) rotate(7deg);
          opacity: 1;
        }
        100% {
          transform: translateX(-50%) scale(1.05) rotate(-4deg);
          opacity: 0.96;
        }
      }

      .gold-glow-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9998;
        background: radial-gradient(
          circle at 50% 18%,
          rgba(255, 215, 70, 0.32) 0%,
          rgba(255, 215, 70, 0.18) 18%,
          rgba(255, 215, 70, 0.08) 38%,
          rgba(255, 215, 70, 0.02) 60%,
          rgba(255, 215, 70, 0) 78%
        );
        animation: goldScreenFlicker 0.22s infinite alternate;
        mix-blend-mode: screen;
      }

      @keyframes goldScreenFlicker {
        0% {
          opacity: 0.55;
          filter: brightness(1) blur(1px);
        }
        25% {
          opacity: 0.68;
          filter: brightness(1.08) blur(1.5px);
        }
        50% {
          opacity: 0.48;
          filter: brightness(0.96) blur(0.8px);
        }
        75% {
          opacity: 0.72;
          filter: brightness(1.12) blur(1.8px);
        }
        100% {
          opacity: 0.6;
          filter: brightness(1.04) blur(1.2px);
        }
      }

      .smoke-area {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 9999;
        overflow: hidden;
      }

      .smoke {
        position: absolute;
        bottom: -250px;
        width: 180px;
        height: 520px;
        background: linear-gradient(
          to top,
          rgba(255, 255, 255, 0.95),
          rgba(255, 255, 255, 0.7),
          rgba(255, 255, 255, 0.4),
          rgba(255, 255, 255, 0.12),
          rgba(255, 255, 255, 0)
        );
        filter: blur(24px);
        animation: smokeRise 9s infinite;
      }

      .smoke:nth-child(1) {
        left: 2%;
        animation-delay: 0s;
      }
      .smoke:nth-child(2) {
        left: 10%;
        animation-delay: 1s;
      }
      .smoke:nth-child(3) {
        left: 18%;
        animation-delay: 2s;
      }
      .smoke:nth-child(4) {
        left: 26%;
        animation-delay: 0.5s;
      }
      .smoke:nth-child(5) {
        left: 34%;
        animation-delay: 1.5s;
      }
      .smoke:nth-child(6) {
        left: 42%;
        animation-delay: 2.5s;
      }
      .smoke:nth-child(7) {
        left: 50%;
        animation-delay: 0.8s;
      }
      .smoke:nth-child(8) {
        left: 58%;
        animation-delay: 1.8s;
      }
      .smoke:nth-child(9) {
        left: 66%;
        animation-delay: 2.8s;
      }
      .smoke:nth-child(10) {
        left: 74%;
        animation-delay: 1.2s;
      }
      .smoke:nth-child(11) {
        left: 82%;
        animation-delay: 2.2s;
      }
      .smoke:nth-child(12) {
        left: 90%;
        animation-delay: 3s;
      }

      @keyframes smokeRise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        10% {
          opacity: 0.95;
        }
        30% {
          transform: translateY(-250px) scale(1.4) translateX(60px);
          opacity: 0.75;
        }
        60% {
          transform: translateY(-700px) scale(2.1) translateX(-50px);
          opacity: 0.45;
        }
        85% {
          transform: translateY(-1100px) scale(2.8) translateX(70px);
          opacity: 0.18;
        }
        100% {
          transform: translateY(-1400px) scale(3.2);
          opacity: 0;
        }
      }

      .bottom-corner-image-left {
        position: fixed;
        bottom: 0;
        left: 0;
        height: 90px;
        width: auto;
        z-index: 1;
        pointer-events: none;
      }

      .bottom-corner-image-right {
        position: fixed;
        bottom: 0;
        right: 0;
        height: 220px;
        width: auto;
        z-index: 1;
        pointer-events: none;
      }
    </style>
  </head>

  <body>
    <audio id="bg-audio" controls autoplay loop>
      <source src="REC_20260310_142206.m4a" type="audio/mp4" />
    </audio>

    <div style="text-align: center; margin-bottom: 20px">
      <button onclick="document.getElementById('bg-audio').play()">
        Play Background Audio
      </button>
    </div>

    <div class="lord-loop">
      <div class="lord-line" id="line1"></div>
      <div class="lord-line" id="line2"></div>
      <div class="lord-line" id="line3"></div>
    </div>

    <script>
      const line1 = document.getElementById("line1");
      const line2 = document.getElementById("line2");
      const line3 = document.getElementById("line3");

      function runLordLoop() {
        line1.textContent = "";
        line2.textContent = "";
        line3.textContent = "";

        setTimeout(() => {
          line1.textContent = "Lord Jesus Christ";
        }, 0);

        setTimeout(() => {
          line2.textContent = "Son of God";
        }, 2000);

        setTimeout(() => {
          line3.textContent = "Have Mercy on Me";
        }, 4000);

        setTimeout(() => {
          line1.textContent = "";
          line2.textContent = "";
          line3.textContent = "";
          a;
        }, 7000);
      }

      runLordLoop();
      setInterval(runLordLoop, 8000);
    </script>
  </body>
</html>
